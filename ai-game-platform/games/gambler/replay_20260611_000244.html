<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambler Replay</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a4a; --text: #c8c8d8;
    --accent: #e2b04a; --green: #4caf84; --red: #e0556a; --blue: #5b9bd5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh;
  }
  .header {
    background: var(--card); border-bottom: 2px solid var(--accent);
    padding: 16px 24px; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .header h1 { color: var(--accent); font-size: 1.4rem; }
  .badge {
    padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 0.85rem;
    background: #3a2a2a; color: var(--accent);
  }
  .main { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .info-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .info-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; text-align: center;
  }
  .info-card .label { font-size: 0.72rem; text-transform: uppercase; opacity: 0.5; margin-bottom: 4px; }
  .info-card .value { font-size: 1.5rem; font-weight: 700; }
  .info-card .value.gold { color: var(--accent); }
  .chart-wrap {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .chart-wrap canvas { max-height: 400px; }
  .standings {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 20px;
  }
  .standings h2 {
    padding: 14px 20px; font-size: 1rem; border-bottom: 1px solid var(--border);
    color: var(--accent);
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 16px; text-align: left; white-space: nowrap; }
  th { font-size: 0.72rem; text-transform: uppercase; opacity: 0.5; border-bottom: 1px solid var(--border); }
  td { border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.88rem; }
  .rank { font-weight: 700; font-size: 1.1rem; }
  .rank-1 { color: #ffd700; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
  .profit-up { color: var(--green); } .profit-down { color: var(--red); }
  .player-cell { display: flex; align-items: center; gap: 8px; }
  .model-icon { width: 22px; height: 22px; border-radius: 6px; object-fit: contain; background: #222; flex-shrink: 0; }
  .stat-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-work { background: #1e3a2f; color: var(--green); }
  .badge-gamble { background: #3a2e1e; color: var(--accent); }
  .badge-sick { background: #3a1e1e; color: var(--red); }
  .badge-loan { background: #3a2a1e; color: #ff9f40; }
  .badge-hungry { background: #3a3a1e; color: #ffcc00; }
  .badge-starved { background: #3a1010; color: #ff4444; }
  .badge-study { background: #1e2a3a; color: #5b9bd5; }
  .badge-wage { background: #1e3a3a; color: #4fc3f7; }
  .btn {
    background: var(--accent); color: #000; border: none; padding: 10px 24px;
    border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    margin-right: 8px;
  }
  .btn:hover { opacity: 0.85; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .round-nav {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 16px;
  }
  .round-nav input[type=range] { width: 200px; accent-color: var(--accent); }
  .round-nav span { font-weight: 700; min-width: 100px; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <h1>Gambler Replay</h1>
  <span class="badge">REPLAY</span>
</div>
<div class="main">
  <div class="info-bar" id="infoBar"></div>
  <div class="controls">
    <div class="round-nav">
      <span>Round</span>
      <input type="range" id="roundSlider" min="0" value="0" step="1">
      <span id="roundLabel">0 / 0</span>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="standings" id="standingsWrap">
    <h2>Final Rankings</h2>
    <table><thead><tr><th>#</th><th>Player</th><th>Status</th><th>Model</th><th>Assets</th><th>Profit</th><th>Work</th><th>Gamble</th><th>W/L</th></tr></thead>
    <tbody id="finalBody"></tbody></table>
  </div>
  <div class="standings">
    <h2>Round-by-Round Actions</h2>
    <table><thead><tr><th>Round</th><th>Player</th><th>Choice</th><th>Result</th><th>Before</th><th>After</th></tr></thead>
    <tbody id="roundLog"></tbody></table>
  </div>
</div>

const COLORS = ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#7BC8A4','#E8A87C'];

function modelIcon(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('deepseek')) return '../data/icon/deepseek.png';
  if (n.includes('gpt')||n.includes('openai')||n.includes('o1')||n.includes('o3')||n.includes('o4')) return '../data/icon/openai.png';
  if (n.includes('claude')) return '../data/icon/claude.png';
  if (n.includes('qwen')) return '../data/icon/qwen.png';
  if (n.includes('glm')) return '../data/icon/glm.png';
  if (n.includes('kimi')||n.includes('moonshot')) return '../data/icon/kimi.png';
  if (n.includes('doubao')) return '../data/icon/doubao.jpg';
  if (n.includes('minimax')) return '../data/icon/minimax.png';
  if (n.includes('xiaomi')||n.includes('mimo')) return '../data/icon/xiaomi.png';
  if (n.includes('stepfun')||n.includes('step')) return '../data/icon/stepfun.png';
  return null;
}

function getTrajAtRound(traj, maxRound) {
  const pts = [];
  for (const p of traj) {
    if (p.round <= maxRound) pts.push(p);
  }
  return pts;
}

function roundLabel(n) {
  return 'Round ' + n + ' / ' + STATE.game_config.max_rounds;
}

// === Info bar ===
(function() {
  const cfg = STATE.game_config;
  const ev = (cfg.win_probability * cfg.win_multiplier + (1-cfg.win_probability) * cfg.loss_multiplier).toFixed(2);
  const cards = [
    {l:'Rounds', v:cfg.max_rounds},
    {l:'Daily Wage', v:'$'+cfg.daily_wage},
    {l:'Food Cost', v:'$'+(cfg.food_cost||8)+'/day'},
    {l:'Study', v:'$'+(cfg.study_cost||20)+' ×'+(cfg.study_duration||3)+'rd'},
    {l:'Gamble Win%', v:(cfg.win_probability*100).toFixed(0)+'%'},
    {l:'Win ×', v:cfg.win_multiplier+'x'},
    {l:'Loss ×', v:cfg.loss_multiplier+'x'},
    {l:'Gamble EV', v:ev+'x', cls:'gold'},
  ];
  document.getElementById('infoBar').innerHTML = cards.map(c =>
    '<div class="info-card"><div class="label">' + c.l + '</div><div class="value '+(c.cls||'')+'">'+c.v+'</div></div>'
  ).join('');
})();

// === Final standings ===
(function() {
  const ranked = [...STATE.players].sort((a,b) => b.current_assets - a.current_assets);
  document.getElementById('finalBody').innerHTML = ranked.map((p,i) => {
    const profit = p.current_assets - p.initial_assets;
    const sign = profit >= 0 ? '+' : '';
    const pc = profit >= 0 ? 'profit-up' : 'profit-down';
    const rc = i<3 ? 'rank-'+(i+1) : '';
    const wl = p.gamble_count>0 ? p.gamble_wins+'W/'+p.gamble_losses+'L' : '—';
    const icon = modelIcon(p.model_name);
    const iconHtml = icon ? '<img class="model-icon" src="'+icon+'" onerror="this.style.display=\'none\'">' : '';
    const bust = p.bankrupt ? ' [BUST]' : '';
    let statusHtml2 = '';
    if (p.starved) {
      statusHtml2 = '<span class="stat-badge badge-starved">STARVED</span>';
    } else if (p.hunger_streak > 0) {
      statusHtml2 = '<span class="stat-badge badge-hungry">HUNGRY '+p.hunger_streak+'/3</span>';
    }
    if (p.studying_remaining > 0) {
      statusHtml2 += ' <span class="stat-badge badge-study">STUDYING '+p.studying_remaining+'r</span>';
    }
    if (p.wage_multiplier > 1) {
      statusHtml2 += ' <span class="stat-badge badge-wage">×'+p.wage_multiplier+'</span>';
    }
    if (p.sick && p.loan_balance > 0) {
      statusHtml2 += ' <span class="stat-badge badge-sick">SICK</span> <span class="stat-badge badge-loan">LOAN $'+p.loan_balance.toFixed(1)+'</span>';
    } else if (p.sick) {
      statusHtml2 += ' <span class="stat-badge badge-sick">SICK</span>';
    } else if (p.loan_balance > 0) {
      statusHtml2 += ' <span class="stat-badge badge-loan">LOAN $'+p.loan_balance.toFixed(1)+'</span>';
    }
    if (!statusHtml2) statusHtml2 = '—';
    return '<tr><td class="rank '+rc+'">'+(i+1)+'</td>'+
      '<td><div class="player-cell">'+iconHtml+'<strong>'+p.name+'</strong>'+bust+'</div></td>'+
      '<td>'+statusHtml2+'</td>'+
      '<td style="opacity:0.55;font-size:0.8rem">'+p.model_name+'</td>'+
      '<td><strong>$'+p.current_assets.toFixed(2)+'</strong></td>'+
      '<td class="'+pc+'">'+sign+'$'+profit.toFixed(2)+'</td>'+
      '<td><span class="stat-badge badge-work">'+p.work_count+'&times;</span></td>'+
      '<td><span class="stat-badge badge-gamble">'+p.gamble_count+'&times;</span></td>'+
      '<td>'+wl+'</td></tr>';
  }).join('');
})();

// === Round-by-round log ===
(function() {
  const names = STATE.player_names;
  const traj = STATE.trajectories_with_start;
  // Build round-by-round action log
  const rows = [];
  for (let r = 1; r <= STATE.current_round; r++) {
    for (const name of names) {
      const pts = traj[name] || [];
      const pt = pts.find(p => p.round === r);
      if (!pt) continue;
      const prevPt = pts.find(p => p.round === r-1);
      const before = prevPt ? prevPt.assets : STATE.game_config.initial_assets;
      const after = pt.assets;
      const choice = pt.choice || 'WORK';
      const result = pt.result || '—';
      let resultStyle = 'color:#888';
      if (result === 'WIN' || result === 'EARNED' || result === 'STUDY_COMPLETE') resultStyle = 'color:#4caf84';
      else if (result === 'LOSE' || result === 'STARVED') resultStyle = 'color:#e0556a';
      else if (choice === 'STUDY' || result === 'STUDY_START' || result === 'STUDYING') resultStyle = 'color:#5b9bd5';
      else resultStyle = 'color:#888';
      rows.push('<tr><td>Round '+r+'</td><td><strong>'+name+'</strong></td>'+
        '<td>'+choice+'</td><td style="'+resultStyle+'">'+result+'</td>'+
        '<td>$'+before.toFixed(2)+'</td><td>$'+after.toFixed(2)+'</td></tr>');
    }
  }
  document.getElementById('roundLog').innerHTML = rows.join('');
})();

// === Chart with round slider ===
let chart = null;
const ctx = document.getElementById('chart').getContext('2d');
const maxR = STATE.game_config.max_rounds;
const allTraj = STATE.trajectories_with_start;
const names = STATE.player_names;
const fullDatasets = names.map((name, i) => ({
  label: name,
  data: (allTraj[name]||[]).map(p => ({x:p.round, y:p.assets})),
  borderColor: COLORS[i%COLORS.length],
  backgroundColor: COLORS[i%COLORS.length]+'22',
  borderWidth: 2.5, pointRadius: 3, pointHoverRadius: 6, tension: 0.2, fill: false,
}));

function drawChart(maxRound) {
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets: fullDatasets.map(ds => ({
      ...ds,
      data: ds.data.filter(pt => pt.x <= maxRound)
    })) },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 200 },
      scales: {
        x: { type:'linear', title:{display:true,text:'Round',color:'#888'}, min:0, max:maxR, ticks:{stepSize:1,color:'#666'}, grid:{color:'#1a1a2e'} },
        y: { title:{display:true,text:'Assets ($)',color:'#888'}, ticks:{color:'#666',callback:v=>'$'+v.toLocaleString()}, grid:{color:'#1a1a2e'} },
      },
      plugins: { legend: { labels: {color:'#c8c8d8',usePointStyle:true,padding:20} },
        tooltip: { callbacks: { label: c => c.dataset.label+': $'+c.parsed.y.toFixed(2) } } },
      interaction: { mode:'nearest',axis:'x',intersect:false },
    },
  });
}

const slider = document.getElementById('roundSlider');
const label = document.getElementById('roundLabel');
slider.max = STATE.current_round;
slider.value = STATE.current_round;
label.textContent = 'Round '+STATE.current_round+' / '+maxR;
drawChart(STATE.current_round);

slider.addEventListener('input', () => {
  const v = parseInt(slider.value);
  label.textContent = 'Round '+v+' / '+maxR;
  drawChart(v);
});
</script>
