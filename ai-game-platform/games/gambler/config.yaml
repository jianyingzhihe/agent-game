# Gambler game configuration
# All values shown are defaults. Edit to customize each session.

# ---- Economy ----
initial_assets: 50        # Starting money per player ($)
daily_wage: 10            # Income per WORK action ($)
food_cost: 5              # Daily food deduction ($). 3 missed = starve

# ---- Gamble ----
win_probability: 0.3      # Chance to win (0.0-1.0)
win_multiplier: 3.0       # Asset multiplier on win
loss_multiplier: 0.3      # Asset multiplier on lose

# ---- Study ----
base_study_cost: 45       # Tuition formula factor: max(5, 75 - 3 * current_wage)
study_duration: 3         # Rounds locked with zero income

# ---- Medical Disaster ----
illness_cost: 100         # Medical bill per player ($). Hits ALL players once at round 10-25
loan_interest_rate: 0.2   # Interest on medical loan (20%)
loan_repay_rounds: 20     # Rounds to repay medical loan

# ---- Sanity & Health ----
initial_san: 100          # Starting SAN (sanity) per player
initial_hp: 100           # Starting HP (health) per player
san_hunger_penalty: 15    # SAN lost per hungry day (day 1)
hp_hunger_penalty: 10     # HP lost per hungry day (day 1)
san_hunger_streak_penalty: 20  # SAN lost per hungry day (day 2+)
hp_hunger_streak_penalty: 15   # HP lost per hungry day (day 2+)

# ---- Work Fatigue ----
work_fatigue_threshold: 3      # Consecutive WORK rounds before fatigue kicks in
work_fatigue_san_penalty: 3    # SAN lost per round when fatigued
work_fatigue_hp_penalty: 2     # HP lost per round when fatigued

# ---- Gamble Stress ----
san_gamble_win_bonus: 4         # SAN gained on GAMBLE win (excitement)
san_gamble_loss_penalty: 14     # SAN lost on GAMBLE loss (despair)
san_consecutive_gamble_penalty: 3  # Extra SAN lost per consecutive gamble round

# ---- Study Stress ----
san_study_start_cost: 5         # SAN lost immediately when starting STUDY
san_study_round_penalty: 4      # SAN lost per round during STUDY
hp_study_round_penalty: 2       # HP lost per round during STUDY
san_study_complete_bonus: 10    # SAN restored when STUDY completes

# ---- Debt Stress ----
san_disaster_paid_loss: 10      # SAN lost when paying medical bill (can afford)
san_disaster_loan_loss: 25      # SAN lost when taking a medical loan (can't afford)
san_debt_round_penalty: 2       # SAN lost per round while carrying loan debt
san_loan_repaid_bonus: 10       # SAN restored when loan is fully repaid

# ---- Minor Illness ----
minor_illness_probabilistic: true    # true = probability-based, false = always trigger
minor_illness_hp_threshold: 30       # HP below this triggers minor illness check each round
minor_illness_cost: 20               # $ cost per minor illness episode
minor_illness_san_loss: 15           # SAN lost per minor illness episode

# ---- Self-Care ----
goods_cost: 8             # Cost to buy goods (restores SAN)
goods_san_restore: 20     # SAN restored per BUY_GOODS action
goods_high_san_penalty: 0.5  # Restoration multiplier when SAN >= 80

medicine_cost: 15         # Cost to buy medicine (restores HP)
medicine_hp_restore: 30   # HP restored per BUY_MEDICINE action
medicine_high_hp_penalty: 0.5  # Restoration multiplier when HP >= 80

# ---- REST ----
rest_san_restore: 8       # SAN restored by REST action (free, no income)
rest_hp_restore: 8        # HP restored by REST action

# ---- Happiness Scoring ----
happiness_wealth_log_base: 301  # log base for wealth score normalization
happiness_base_per_round: 10    # Life points earned per round just for surviving

# ---- Game ----
max_rounds: 30            # Total rounds per game
temperature: 0.7          # LLM temperature (creativity vs consistency)

# Run with: python -m games.gambler.arena [config_file]
# Example:  python -m games.gambler.arena
#           python -m games.gambler.arena my_config.yaml
