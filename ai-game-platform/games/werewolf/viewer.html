<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀 — Game Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12121f;color:#d0d0d8;font-family:'Segoe UI','Microsoft YaHei',sans-serif;min-height:100vh;padding:14px 18px}
h1{text-align:center;font-size:22px;letter-spacing:1px}
.subtitle{text-align:center;opacity:.4;font-size:11px;margin-bottom:12px}

/* ── Controls ── */
.controls{text-align:center;margin:8px 0 10px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
button{background:#d4455a;color:#fff;border:none;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
button:hover{background:#b8384a}
button.small{padding:4px 10px;font-size:10px;background:#444;font-weight:400}
button.small:hover{background:#666}
#stepInfo{font-size:13px;min-width:80px;color:#aaa}
.phase-badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:bold;letter-spacing:.5px}
.phase-badge.night{background:#1e2960;color:#889}
.phase-badge.day{background:#604a1e;color:#cca}
.phase-badge.vote{background:#601e1e;color:#e88}
input[type=file]{display:none}

/* ── Result banner ── */
.result-banner{text-align:center;font-size:20px;font-weight:bold;padding:10px;margin:6px 0;border-radius:8px}
.result-banner.good{background:rgba(69,210,100,.12);color:#4cd268}
.result-banner.evil{background:rgba(220,60,90,.12);color:#e8506a}

/* ── Main layout ── */
.main-layout{display:flex;gap:12px;height:calc(100vh - 155px);min-height:480px;margin-top:6px}

/* ── Left: faction column ── */
.faction-column{width:265px;min-width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;overflow-y:auto}

.faction-panel{border-radius:8px;padding:7px 8px;background:rgba(255,255,255,.025)}
.faction-panel h4{font-size:11px;margin-bottom:5px;text-align:center;padding:3px 0;border-radius:3px;letter-spacing:.4px;font-weight:600}
.faction-panel.gods{border:1px solid rgba(212,180,60,.22)}
.faction-panel.gods h4{background:rgba(212,180,60,.12);color:#d4b43c}
.faction-panel.vills{border:1px solid rgba(60,200,100,.22)}
.faction-panel.vills h4{background:rgba(60,200,100,.12);color:#46d470}
.faction-panel.wolves{border:1px solid rgba(210,55,80,.22)}
.faction-panel.wolves h4{background:rgba(210,55,80,.12);color:#e04862}

.player-card{background:rgba(0,0,0,.18);border-radius:7px;padding:7px 8px;margin-bottom:4px;position:relative;transition:.2s}
.player-card.dead{opacity:.3}
.player-card.dead::after{content:'💀';position:absolute;top:3px;right:6px;font-size:13px}
.player-name{font-size:13px;font-weight:600;margin-bottom:1px}
.player-model{font-size:9px;opacity:.35;margin-bottom:2px}
.player-role{font-size:10px;font-weight:700}
.player-card.gods .player-role{color:#d4b43c}
.player-card.vill .player-role{color:#46d470}
.player-card.wolf .player-role{color:#e04862}
.player-card .action-tag{font-size:9px;opacity:.55;margin-top:2px;line-height:1.3}
.player-card .think-hint{font-size:8px;opacity:.28;margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

.empty-hint{font-size:10px;opacity:.25;text-align:center;padding:10px;font-style:italic}

/* ── Right: dialog ── */
.dialog-column{flex:1;display:flex;flex-direction:column;min-width:0;gap:8px}

.view-tabs{display:flex;gap:4px;flex-shrink:0}
.view-tab{padding:3px 12px;font-size:11px;background:rgba(255,255,255,.05);border-radius:4px 4px 0 0;cursor:pointer;opacity:.45;transition:.15s;border:1px solid transparent;border-bottom:none;font-weight:500}
.view-tab.active{background:rgba(255,255,255,.1);opacity:1;border-color:rgba(255,255,255,.1)}
.view-tab:hover{opacity:.75}

.dialog-panel{flex:1;background:rgba(255,255,255,.025);border-radius:0 8px 8px 8px;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
.dialog-panel h4{font-size:11px;opacity:.4;margin-bottom:2px;position:sticky;top:0;background:#12121f;padding:3px 0;z-index:2}
.log-panel{display:none;flex:1;background:rgba(255,255,255,.025);border-radius:0 8px 8px 8px;padding:8px 10px;overflow-y:auto}
.log-panel h4{font-size:11px;opacity:.4;margin-bottom:6px;position:sticky;top:0;background:#12121f;padding:3px 0;z-index:2}

/* ── Chat bubbles ── */
.chat-bubble{max-width:86%;padding:7px 10px;border-radius:10px;font-size:12px;line-height:1.5;animation:fadeIn .25s}
.chat-bubble.left{align-self:flex-start;background:rgba(255,255,255,.06);border-bottom-left-radius:3px}
.chat-bubble .bbl-header{font-size:10px;font-weight:600;margin-bottom:2px;display:flex;gap:4px;align-items:baseline}
.chat-bubble .bbl-role{font-size:9px;font-weight:400;opacity:.55}
.chat-bubble .bbl-dead{font-size:9px;opacity:.4;margin-left:2px}
.chat-bubble .bbl-speech{color:#ccc}
.chat-bubble .bbl-think{font-size:9px;opacity:.3;margin-top:4px;font-style:italic;border-top:1px solid rgba(255,255,255,.05);padding-top:3px}
.chat-bubble.gods .bbl-header .bbl-name{color:#d4b43c}
.chat-bubble.vill .bbl-header .bbl-name{color:#46d470}
.chat-bubble.wolf .bbl-header .bbl-name{color:#e04862}

/* ── System messages ── */
.msg{text-align:center;font-size:10px;opacity:.38;padding:3px 0;line-height:1.5}
.msg.kill{color:#e04862;opacity:.65;font-weight:600}
.msg.save{color:#46d470;opacity:.65;font-weight:600}
.msg.vote{color:#d4b43c;opacity:.6}
.msg.round{opacity:.2;font-size:10px;font-weight:700;letter-spacing:.5px}
.msg.night-group{font-size:10px;opacity:.35;padding:4px 0;text-align:left;margin:2px 0;font-style:italic}

.log-entry{font-size:10px;padding:2px 0;line-height:1.5;border-bottom:1px solid rgba(255,255,255,.025)}
.log-entry.kill{color:#e04862}
.log-entry.save{color:#46d470}
.log-entry.vote{color:#d4b43c}
.log-entry.info{opacity:.4}

@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:700px){
  .main-layout{flex-direction:column;height:auto}
  .faction-column{width:100%;flex-direction:row;flex-wrap:wrap;gap:5px}
  .faction-panel{flex:1;min-width:100px}
}
</style>
</head>
<body>
<h1>🐺 狼人杀 Viewer</h1>
<div class="subtitle">加载 game.jsonl — 神 / 村民 / 狼人 三阵营 + 对话回放</div>

<div class="controls">
  <button onclick="document.getElementById('fileInput').click()">📂 Load</button>
  <input type="file" id="fileInput" accept=".jsonl" onchange="loadFile(event)">
  <button onclick="prev()">◀</button>
  <span id="stepInfo">-</span>
  <button onclick="next()">▶</button>
  <button class="small" onclick="autoPlay()">▶▶ Auto</button>
  <button class="small" onclick="jumpEnd()">⏭ End</button>
  <span id="phaseLabel" class="phase-badge night"></span>
</div>

<div id="result"></div>

<div class="main-layout">
  <!-- Left: factions -->
  <div class="faction-column">
    <div class="faction-panel gods" id="panelGods"><h4>🔮 神阵营</h4><div id="cardsGods"></div></div>
    <div class="faction-panel vills" id="panelVills"><h4>👤 村民阵营</h4><div id="cardsVills"></div></div>
    <div class="faction-panel wolves" id="panelWolves"><h4>🐺 狼人阵营</h4><div id="cardsWolves"></div></div>
  </div>

  <!-- Right: dialog / log -->
  <div class="dialog-column">
    <div class="view-tabs">
      <span class="view-tab active" id="tabDialog" onclick="switchView('dialog')">💬 对话流</span>
      <span class="view-tab" id="tabLog" onclick="switchView('log')">📋 事件日志</span>
    </div>
    <div class="dialog-panel" id="dialogPanel">
      <h4>📜 游戏过程</h4>
      <div id="dialogContent"></div>
    </div>
    <div class="log-panel" id="logPanel">
      <h4>📋 事件日志</h4>
      <div id="logContent"></div>
    </div>
  </div>
</div>

<script>
// ── State ──
let steps=[], current=-1, players={}, dialogEntries=[], autoTimer=null, currentView='dialog';
const GOD_KEYS=['seer','witch','hunter'];

// ── Role ID extraction ──
function extractRoleId(roleStr){
  const s=(roleStr||'').toLowerCase();
  if(s.includes('werewolf')||s.includes('狼人')) return 'werewolf';
  if(s.includes('seer')||s.includes('预言')) return 'seer';
  if(s.includes('witch')||s.includes('女巫')) return 'witch';
  if(s.includes('hunter')||s.includes('猎人')) return 'hunter';
  return 'villager';
}

// ── Faction grouping ──
function getFactionCSS(p){
  if(p.faction==='werewolf') return 'wolf';
  if(p.role_id && GOD_KEYS.includes(p.role_id)) return 'gods';
  return 'vill';
}
function getFactionGroup(p){
  if(p.faction==='werewolf') return 'wolves';
  if(p.role_id && GOD_KEYS.includes(p.role_id)) return 'gods';
  return 'vills';
}

// ── Load ──
function loadFile(e){
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=ev=>{
    try{
      steps=ev.target.result.trim().split('\n').map(l=>JSON.parse(l));
    }catch(err){
      alert('JSONL parse error: '+err.message); return;
    }
    current=0; players={}; dialogEntries=[];
    rebuild(); render();
  };
  r.readAsText(f);
}

// ── Navigation ──
function prev(){if(current>0){current--;rebuild();render()}}
function next(){if(current<steps.length-1){current++;rebuild();render()}}
function jumpEnd(){current=steps.length-1;rebuild();render()}
function autoPlay(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;return}
  autoTimer=setInterval(()=>{
    if(current>=steps.length-1){clearInterval(autoTimer);autoTimer=null;return}
    current++; rebuild(); render();
  },700);
}

function switchView(view){
  currentView=view;
  document.getElementById('tabDialog').classList.toggle('active',view==='dialog');
  document.getElementById('tabLog').classList.toggle('active',view==='log');
  document.getElementById('dialogPanel').style.display=view==='dialog'?'flex':'none';
  document.getElementById('logPanel').style.display=view==='log'?'block':'none';
}

// ── Rebuild state up to `current` ──
function rebuild(){
  players={}; dialogEntries=[];

  for(let i=0;i<=current;i++){
    const s=steps[i];

    // game_start
    if(s.type==='game_start'){
      s.players.forEach(p=>{
        const rid=extractRoleId(p.role);
        players[p.name]={
          name:p.name,
          role:p.role||'?',
          role_id:rid,
          faction:p.faction||(rid==='werewolf'?'werewolf':'villager'),
          model:p.model||'',
          alive:true,
          persona:p.persona||'',
          think:'',
          speech:'',
          action:''
        };
      });
      dialogEntries.push({t:'msg',c:'round',txt:'🎮 游戏开始 — 暗中分配身份中...'});
    }

    // round_start
    if(s.type==='round_start'){
      dialogEntries.push({t:'msg',c:'round',txt:`━━━ Round ${s.round} ━━━`});
    }

    // response
    if(s.type==='response'){
      const p=players[s.player];
      if(!p) continue;
      const ph=s.phase||'';
      const pa=s.parsed||{};

      if(ph==='day_discussion'){
        p.speech=pa.speech||'';
        p.think=pa.reason||'';
        const fc=getFactionCSS(p);
        dialogEntries.push({
          t:'speech',c:fc,
          name:s.player,role:p.role,
          speech:pa.speech||'',
          think:pa.reason||'',
          dead:!p.alive
        });
      }
      if(ph==='day_vote'){
        const vt=pa.vote||'?';
        p.action='VOTE → '+vt;
        p.think=pa.reason||'';
        dialogEntries.push({t:'msg',c:'info',txt:`🗳 ${s.player} 投票给 ${vt}`});
      }
      if(ph==='hunter_shot'){
        p.action='SHOOT → '+(pa.target||'?');
        p.think=pa.reason||'';
        dialogEntries.push({t:'msg',c:'kill',txt:`💀 猎人 ${s.player} 开枪带走 ${pa.target||'?'}`});
      }
      if(ph==='night_werewolf'){
        p.action='KILL → '+(pa.target||'?');
        p.think=pa.reason||'';
        dialogEntries.push({t:'msg',c:'night',txt:`🌙 狼人 ${s.player} 选择击杀 ${pa.target||'?'}`});
      }
      if(ph==='night_seer'){
        p.action='CHECK → '+(pa.target||'?');
        p.think=pa.reason||'';
        dialogEntries.push({t:'msg',c:'night',txt:`🔮 预言家 ${s.player} 查验 ${pa.target||'?'}`});
      }
      if(ph==='night_witch'){
        p.think=pa.reason||'';
        const sv=(pa.save||'no').toLowerCase();
        const po=(pa.poison||'none').toLowerCase();
        p.action=`SAVE:${sv} POISON:${po}`;
        let wmsg=`🧪 女巫 ${s.player}`;
        const acts=[];
        if(sv==='yes') acts.push('使用解药救人');
        if(po!=='none') acts.push(`毒杀 ${po}`);
        if(acts.length) wmsg+=': '+acts.join('，');
        else wmsg+=': 不使用药水';
        dialogEntries.push({t:'msg',c:(po!=='none'?'kill':'night'),txt:wmsg});
      }
    }

    // round_end
    if(s.type==='round_end'){
      const nd=(s.night||{}).deaths||[];
      nd.forEach(d=>{
        if(players[d]) players[d].alive=false;
        dialogEntries.push({t:'msg',c:'kill',txt:`💀 ${d} 昨夜死亡`});
      });
      const ed=(s.day||{}).vote||{};
      if(ed.eliminated){
        if(players[ed.eliminated]) players[ed.eliminated].alive=false;
        const cnt=ed.vote_counts||{};
        const vc=cnt[ed.eliminated]||0;
        dialogEntries.push({t:'msg',c:'vote',txt:`🗳 ${ed.eliminated} 被投票放逐 (${vc} 票)`});
      }
      const hs=(s.day||{}).hunter_shot;
      if(hs){
        if(players[hs]) players[hs].alive=false;
        dialogEntries.push({t:'msg',c:'kill',txt:`💥 猎人开枪击杀 ${hs}`});
      }
    }
  }
}

// ── Render ──
function render(){
  const si=document.getElementById('stepInfo');
  si.textContent=current>=0?`Step ${current+1}/${steps.length}`:'-';

  // phase badge
  const s=current>=0?steps[current]:null;
  const ph=s?.phase||'';
  const lbl=document.getElementById('phaseLabel');
  const map={
    night:'🌙 NIGHT',werewolf:'🐺 WOLF KILL',seer:'🔮 SEER',witch:'🧪 WITCH',
    day:'☀ DAY',discussion:'☀ DAY DISCUSSION',vote:'🗳 VOTE',hunter:'💀 HUNTER'
  };
  let badge='', cls='night';
  for(const [k,v] of Object.entries(map)){
    if(ph.includes(k)){badge=v;break}
  }
  if(ph.includes('day')||ph.includes('discussion')) cls='day';
  else if(ph.includes('vote')||ph.includes('hunter')) cls='vote';
  lbl.textContent=badge||ph||''; lbl.className='phase-badge '+cls;

  // ── Faction panels ──
  const groups={gods:[],vills:[],wolves:[]};
  Object.entries(players).forEach(([name,p])=>{
    groups[getFactionGroup(p)].push({name,...p});
  });

  function cardHTML(name,p){
    const dead=!p.alive?'dead':'';
    const fc=getFactionCSS(p);
    return `<div class="player-card ${dead} ${fc}">
      <div class="player-name">${!p.alive?'💀 ':''}${name}</div>
      <div class="player-model">${p.model}</div>
      <div class="player-role">${p.role}</div>
      ${p.action?`<div class="action-tag">⚡ ${p.action}</div>`:''}
      ${p.speech?`<div class="think-hint" title="${esc(p.speech)}">💬 ${esc(p.speech.substring(0,45))}…</div>`:''}
      ${p.think?`<div class="think-hint" title="${esc(p.think)}">🧠 ${esc(p.think.substring(0,35))}…</div>`:''}
    </div>`;
  }

  document.getElementById('cardsGods').innerHTML = groups.gods.length
    ? groups.gods.map(({name,...p})=>cardHTML(name,p)).join('')
    : '<div class="empty-hint">本局无神职</div>';
  document.getElementById('cardsVills').innerHTML = groups.vills.length
    ? groups.vills.map(({name,...p})=>cardHTML(name,p)).join('')
    : '<div class="empty-hint">本局无村民</div>';
  document.getElementById('cardsWolves').innerHTML = groups.wolves.length
    ? groups.wolves.map(({name,...p})=>cardHTML(name,p)).join('')
    : '<div class="empty-hint">本局无狼人</div>';

  // ── Dialog ──
  document.getElementById('dialogContent').innerHTML = dialogEntries.map(e=>{
    if(e.t==='msg'){
      const cn=e.c==='night'?'night-group':e.c;
      return `<div class="msg ${cn==='night'?'':cn}">${e.txt}</div>`;
    }
    if(e.t==='speech'){
      return `<div class="chat-bubble left ${e.c}">
        <div class="bbl-header">
          <span class="bbl-name">${e.dead?'💀 ':''}${e.name}</span>
          <span class="bbl-role">${e.role||''}</span>
          ${e.dead?`<span class="bbl-dead">(已阵亡)</span>`:''}
        </div>
        <div class="bbl-speech">${esc(e.speech||'(沉默)')}</div>
        ${e.think?`<div class="bbl-think">🧠 内心想法: ${esc(e.think)}</div>`:''}
      </div>`;
    }
    return '';
  }).join('');

  // ── Log ──
  document.getElementById('logContent').innerHTML = dialogEntries
    .filter(e=>e.t==='msg')
    .map(e=>`<div class="log-entry ${e.c==='night'?'info':e.c}">${e.txt}</div>`)
    .join('');

  // scroll dialog
  const dp=document.getElementById('dialogPanel');
  dp.scrollTop=dp.scrollHeight;
  const lp=document.getElementById('logPanel');
  if(lp.style.display!=='none') lp.scrollTop=lp.scrollHeight;

  // ── Result ──
  const res=document.getElementById('result');
  // determine winner from alive players on last step
  if(current>=steps.length-2){
    let wolves=0, vills=0;
    Object.values(players).forEach(p=>{
      if(!p.alive) return;
      if(p.faction==='werewolf') wolves++;
      else vills++;
    });
    if(!wolves) res.innerHTML='<div class="result-banner good">🏆 好人阵营获胜！所有狼人已被消灭</div>';
    else if(wolves>=vills) res.innerHTML='<div class="result-banner evil">🐺 狼人阵营获胜！狼人占领了村庄</div>';
    else res.innerHTML='';
  }

  // ── Highlight faction panels ──
  const winFaction=document.querySelector('.result-banner')?.classList.contains('evil')?'wolves':'gods';
  document.querySelectorAll('.faction-panel').forEach(el=>el.style.boxShadow='none');
  if(current>=steps.length-2){
    const panel=document.getElementById('panel'+winFaction.charAt(0).toUpperCase()+winFaction.slice(1));
    if(panel) panel.style.boxShadow='0 0 12px rgba(255,255,255,.06)';
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
